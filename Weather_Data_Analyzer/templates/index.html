<!DOCTYPE html>
<html>
<head>
    <title>Weather Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🌤 Weather Analyzer</h2>

    <form action="/result" method="post">
        <input type="text" name="city" placeholder="Enter City" required>
        <br>
        <button type="submit">Check Weather</button>
    </form>
</div>

</body>
</html>
